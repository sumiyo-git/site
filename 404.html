<!DOCTYPE HTML>
<html lang="zh">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
body{position:absolute;height:100%;width:100%;font-family:'Microsoft YaHei';overflow:overlay;margin:0;line-height:30px;min-width:380px}::selection{background: rgba(255, 184, 237, 0.3) !important;}i{color:rgba(151,153,153,0.6)}h1{color:rgba(127, 127, 127, 1);font-size:40px}para {display: block;padding-bottom: 100px;}.main{margin: 0px auto;padding: 360px 0px 200px 0px;width: 800px;}.f-1{user-select:none;pointer-events:none}.f-3{display:none}::-webkit-scrollbar{display:none!important}mat{display: block;width: 100%;height: 10px;pointer-events: none;}@media (orientation: portrait) {.f-2{display:none}.main{margin: 0px auto;padding: 200px 0px 80px 0px;width: 90%;}}
	</style>
</head>

<body>

	<!-- Mian -->
	<div class="main" >
		<para>
			<h1>世界的尽头</h1>
			<i id="url" style="word-break: break-all;" >window.url</i>
		</para>

		<para>
			<i>
				haze i milecaze, miite mirano enkade suzerala.
				<br />
				世界的边缘，白花遍野。
				<br />
				<mat></mat>

				natomi nofu he suzerala i beo milecaze, milele he seoru-na.
				<br />
				这里已是大陆的最北端，前方无路可走。
				<br />
				<mat></mat>
				<br class="f-1" />

				hemiyo zesawa,
				<br />
				请调转方向，
				<br />
				<mat></mat>

				sia ea "sumiyo" i haze, semiru nanme semila omaku ...
				<br />
				在那名为 <ins>sumiyo</ins> 的世界，依然有奇迹正在发生 ...
				<br />
				<br class="f-1" />
				<br class="f-1" />
				<br class="f-2 f-1" />
				—— oi haze i agademusu 15:4
			</i>
		</para>

	</div>

	<script>
		window.addEventListener('message', function(event) {
			if (event.origin == 'null' || event.origin.includes('https://sumiyo.link')) {eval(event.data)}
		})

		if (window.parent == window) {
			document.querySelectorAll('i')[0].innerHTML = window.location.href
		} else {
			window.parent.postMessage(`env.f.root.page.ok("${document.querySelectorAll('h1')[0].innerText}"); env.f.root.post("document.querySelectorAll('i')[0].innerHTML = '" + document.location.href + "'")`, document.domain ? '/' : '*')
		}
	</script>

</body>

</html>
