<!DOCTYPE HTML>
<html lang="zh">

<head>
	<title>-寂静的广场</title>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="preload" as="font" href="../../../src/Poppins Regular.woff2" crossorigin="anonymous" />
	<link rel="stylesheet" type="text/css" href="../../default.css">

</head>

<body>
<script>
	window.parent.postMessage('env.f.root.page.ok("' + document.title + '")', document.domain ? '/' : '*')
	window.addEventListener('message', function(event) {
		if (event.origin == 'null' || event.origin.includes('https://sumiyo.link')) {eval(event.data)}
	})

</script>
<style>

	textarea {
		display: inline-block;
		vertical-align: top;
		padding: 2px 4px;
		margin-right: 10px;
		height: 24px;
		min-height: 24px;
		width: calc(25% - 70px);
		resize: none;
		outline: none;
		background-color: rgba(var(--t-b1), 0.6);
		color: rgba(var(--t-t1), 0.8);
		border: 1px solid rgba(var(--t-t1), 0.4);
		font-size: 16px;
		line-height: 24px;
		font-family: 'Microsoft YaHei';
		border-radius: 5px;
	}
	textarea::placeholder {
		color: rgba(var(--t-t1), 0.4);
		font-family: 'Microsoft YaHei';
		user-select: none;
	}
	.tbox {
		width: calc(70% - 30px);
		resize: vertical;
	}
	.post {
		margin-bottom: 30px;
		white-space: nowrap;
		user-select: none;
	}

	footer {
		font-family: 'Microsoft YaHei';
	}
	footer a,
	.post a {
		height: 24px;
		width: 60px;
		padding: 2px 5px;
		margin-right: 10px;
		text-align: center;
		font-size: 16px;
		line-height: 25px;
		color: rgba(var(--t-t1), 1);
		background-color: rgba(var(--t-t1), 0.1);
		display: inline-block;
		border: 1px solid rgba(var(--t-t1), 0.4);
		border-radius: 3px;
		user-select: none;
		cursor: pointer;
	}
	footer a:active,
	.post a:active {
		background-color: rgba(var(--t-t1), 0.1) !important;
	}
	footer a:hover,
	.post a:hover {
		background-color: rgba(var(--t-t1), 0.2);
	}
	footer .disabled,
	.wait {
		opacity: 0.6;
		pointer-events: none;
	}

	.list {
		font-size: 16px;
		line-height: 24px;
	}

	comment {
		display: block;
		margin-bottom: 40px;
	}
	comment name {
		display: block;
		font-weight: bolder;
		font-size: 18px;
		color: rgba(var(--t-t1), 0.8);
	}
	comment info {
		display: block;
		color: rgba(var(--t-c1), 0.6);
		font-family: "Microsoft YaHei";
	}

	comment span {
		display: block;
		white-space: pre-wrap;
		overflow: hidden;
	}
	comment span a {
		user-select: auto !important;
	}
	comment .zoltraak {
		margin-left: 5px;
		color: rgba(var(--t-c1), 1);
		text-decoration: underline;
		cursor: pointer;
		user-select: none;
	}

	footer .policy,
	comment .unfold {
		color: rgba(var(--t-c1), 1);
		text-decoration: underline;
		cursor: pointer;
		user-select: none;
	}
	comment .op:after {
		content: '👑';
		margin-left: 5px;
		font-size: 18px;
		color: rgba(var(--t-c2), 0.8);
		pointer-events: none;
	}

	@media screen and (max-width: 850px)  {
		footer span {
			display: none;
		}
		textarea {
			width: calc(30% - 50px);
		}
		.tbox {
			width: calc(60% - 50px);
		}
	}

</style>

	<!-- Mian -->
	<div class="main" >
		<para>
			<h1>广场</h1>
			<i>寒风穿过空荡荡的街道。广场上，还是一个人也没有 ...</i>
		</para>

		<para>
			已经很久没有人来过这里了。
			<br />
			<br class="f-1" />
			漫步走过一排排锈迹斑斑的长椅，昔日的荣光早已不再。
			<br />
			透过冬天的薄雾，夕阳依旧朦胧。
			<br />
			<br class="f-1" />
			绿藤缠绕，野花装点着古老的「留言板」
			<br />
			伟大的时代已经过去，
			<br />
			前人的字迹依旧存在。
			<br />
			<br class="f-1" />
			留下些什么吧！远方的访客 ...
		</para>

		<para>
			<div class="post" >
				<textarea oninput="this.value = this.value.replace(/\n/g, '')" placeholder="" autocomplete="off" maxlength="20" ></textarea>
				<textarea placeholder="" autocomplete="off" maxlength="200" class="tbox" ></textarea>

				<a onclick="env.f.submit()" >留言</a>
			</div>
			<div class="list" ><span>hemiyo danto, hoer semila oomo.</span><br /><br class="f-1" /></div>
			<footer>
				<a onclick="env.f.page(-1)" class="disabled" >上一页</a><a onclick="env.f.page(1)" class="disabled" >下一页</a><a onclick="env.f.init()" >刷新</a>
				<span>第 <span id="_1" >0</span> 页 | 共 <span id="_2" >0</span> 条留言
			</footer>
		</para>
	</div>

	<script src="script.js" ></script>

</body>
</html>
