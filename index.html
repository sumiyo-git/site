	env.tmp.root.t1 = setInterval(() => {
		if (!document.hidden && env.tmp.root.d2 && env.d.init.root == 2) {
			setTimeout(function (){
				setTimeout(function (){
					env.e.root.avatar[0].removeAttribute('style')

				setTimeout(function (){
					env.e.root.load1?.remove()
					env.e.root.load1 = null

					env.d.init.root = 1

				env.e.root.load1?.removeAttribute('style')

			}, 1000)
