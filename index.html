<!--
	大陸の遥か北の果て。
	この世界の人々が天国と呼ぶ場所
	「魂の眠る地」にたどり着いた。
	そこは多くの魂が集まる場所で、
	私はかつての戦友達と対話した。

				ー大魔法使いフランメー
-->

<!DOCTYPE HTML>
<html lang="zh">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>sumiyo.link</title>
	<link rel="shortcut icon" href="src/icon.png?ver=7" />
	<link rel="stylesheet" type="text/css" href="style.css" />
	<link rel="stylesheet" type="text/css" href="style_flexible.css" />

	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	<link rel="preload" as="font" href="src/Poppins Regular.woff2" crossorigin="anonymous" />
	<link rel="stylesheet" type="text/css" href="css/player.css"  />

</head>



<body style="pointer-events: none;" >
<script>
	// 定义核心变量
	const env = {
		'data': {
			'version': {},
			'list': {},
			'visitors': 0,
			'lang': navigator.language,
			'avatar': 'src/sumiyo.webp',
			'isNew': null,
			'isLoad': 0,
			'isNetwork': (document.domain != '' && true || false),
			'isMobile': (window.innerWidth < 900 && true || false),
		},
		'tmp': {
			't1': new Date(),
		},
		'f': {},
		'timer': {}
	}

	// 仅允许直接访问此页
	if (document.domain != '' && ((window.location.href != 'https://sumiyo.link/') || window.location.href.includes('https://sumiyo.link/blog'))) {
		body.style.display = 'none';
		window.location.href = 'https://sumiyo.link/';
	}

</script>




<!-- 主页界面 -->

<div class="box-1" >
	<header style="opacity: 0;" >
		<a onclick="env.f.blog.open('page/square')" >Square</a>|<a onclick="env.f.blog.open('page/about')" >About</a>
		<btn1 onclick="env.f.menu.open()" ></btn1>
		<btn2 onclick="env.f.menu.close()" ></btn2>
	</header>

	<div class="box-2" >
		<span class="t-3" >sumiyo</span>
		<div class="t-39" ></div>
	</div>

	<!-- 最大胆的设计，让我们摆脱了头像框的传统限制 -->
	<img class="avatar" style="transform: scale(1.02); opacity: 0;" fetchpriority="high" onload="env.f.init()" />

	<!-- 博客框架 -->
	<div class="blog" >
		<btn1 onclick="env.f.blog.close()" ></btn1>
		<iframe></iframe>
	</div>
</div>



<div class="FixedBox" >

	<!-- Menu  -->
	<div class="menu" >
		<div class="menu-title" >MENU.</div>
		<hr class="menu-line" />

		<!-- 博客面板 -->
		<div class="menu-box" style="margin-top: 10px;" >
			<div class="menu-btn" onclick="env.f.menu.c1()" >
				<div class="menu-check menu-check-active" id="menu-check-1" ></div>检索:
			</div>
			<span style="line-height: 18px; font-size: 18px; margin-left: 8px; color: rgba(var(--t-t1), 0.3); user-select: none;" ><span class="blog-num" >0</span> items</span>

			<div class="MenuCheck1-inner" >
				<div id="search" >
					<textarea type="text" id="searchInput" onfocus="this.select();" maxlength="14" placeholder="" autocomplete="off" ></textarea><span class="t-38" ></span>
					<ul class="search-result" ></ul>
				</div>
			</div>
		</div>

		<!-- 通知 -->
		<div class="menu-box" style="margin-top: 0px;" >
			<div class="menu-btn" onclick="env.f.menu.c2()" >
				<div class="menu-check menu-check-active" id="menu-check-2" ></div>通知
			</div>

			<div class="MenuCheck2-inner" ></div>
		</div>

		<hr class="menu-line" style="margin-top: 80px;" />

		<!-- 联系 -->
		<div class="menu-box" style="margin-top: 10px;" >
			<div class="menu-btn" onclick="env.f.menu.c3()" >
				<div class="menu-check menu-check-active" id="menu-check-3" ></div>联系
			</div>

			<div class="MenuCheck3-inner" >
				<a href="mailto:me@sumiyo.link" target="_blank" class="contact" >me@sumiyo.link<span class="t-4" ></span></a>
			</div>
		</div>

		<!-- 协议 -->
		<div class="menu-policy" >
			<span class="t-41" onclick="env.f.blog.open('page/policy')" >「 Privacy & Copyright 」</span>
		</div>
	</div>



	<!-- player  -->
	<div class="player" >
		<audio preload="none" ></audio>
		<div class="player-menu" >
			<div class="player-header" >
				<a onclick="player.f.lrc.gui()" >歌词</a> | <a onclick="player.f.reset()" >重置</a>
				<div class="player-header-right" >
					<span class="player-sound0" ></span><span class="player-sound1" title="音量" ><div></div></span>
					<a onclick="player.f.mode()" title="列表循环" ></a>
				</div>
			</div>
			<div class="player-list" ><div></div></div>
		</div>
		<div class="player-ask" >
			这篇文章附有 1 首音乐，<br />想要听听吗？<br />
			<span><a>打开</a> | <a onclick="player.f.add.ask(0)" >取消</a></span>
		</div>
		<div class="player-ui" >
			<div class="PlayerButton PB-p1 PlayerButton-pause" onclick="player.f.play()" ></div>
			<div class="player-name" ></div>
			<div class="player-bar0" ><div class="player-bar1" ><div></div></div></div>
		</div>
		<div class="player-cover" onclick="player.f.menu();" ><img onload="player.f.loadPlayer()" /></div>
		<a onclick="player.f.show()" class="player-mobile0 f-3" ></a>
		<a onclick="player.f.show()" class="player-mobile1 f-3" ></a>

	</div>
	<div class="player-lrc" >
		<img onload="setTimeout(function (){$(player.e.lrcI).css('opacity', '1')}, 1000)" />
		<blur ></blur>

		<!-- 这个 headerSide 模仿了 frieren-anime.jp/ 的设计 -->
		<div class="player-title" ><span></span></div>
		<list></list>
		<header>
			<btn1 onclick="player.f.lrc.gui()" ></btn1>
			<div class="PlayerButton PB-p2 PlayerButton-pause" onclick="player.f.play()" ></div>
		</header>
	</div>


	<!-- Footer -->
	<footer class="f-2" >
		<div>
			<!-- 简短但真挚的感谢 -->
			<txt>项目支持:</txt>
			<a onclick="window.open('https://www.cloudflare.com/')" target="_blank" >
				<img src="src/footer/cloudflare.png" style="opacity: 0; filter: saturate(90%);" onload="$(this).addClass('fade-in-1')" id="load-img" />
			</a>
		</div>
		<div>
			<!-- 一点点小小的成就 -->
			<txt> | <span id="onlineDate"></span> 天 & <span id="visit_counter">0 访客</txt>
		</div>
	</footer>



	<!-- MESSAGE   V. 1.0.0 -->
	<div class="message" >
		<div class="message-box" >content</div>
	</div>
	<div class="pageloading" >
		<div class="pageloading0 shining-1" >page.loading(): ...</div>
		<div class="pageloading1" >Err: page loading timeoout 「over 20000ms」</div>
	</div>






<!-- Javascript -->
	<script src="blog\staticDB.js" ></script>
	<script src="js\search.js"></script>
	<script src="js\typed.js"></script>
	<script src="script.js" ></script>
	<script src="js\player.js"></script>

	<script>
		// 检查页面加载情况
		setTimeout(function (){
			if (env.tmp.t2 != 'ok') {
				$('.message-box').html('Failed to load "script. js" (TIMEOUT)　<a onclick="location.reload();" href="javascript:;" style="color: rgb(var(--t-b1));" ><ins>Refresh</ins></a>');
				$('.message').addClass('message-active');
			}
			env.tmp.t2 = null
			delete env.tmp.t2
		}, 10000);
	</script>
</body>


</html>
